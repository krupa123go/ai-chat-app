<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .chat-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 700px;
      overflow: hidden;
    }

    .chat-header {
      background: #1a56a0;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 16px 16px 0 0;
    }

    .chat-header .avatar {
      width: 38px;
      height: 38px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .chat-header h1 { font-size: 17px; font-weight: 600; }
    .chat-header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .message .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.ai .bubble {
      background: #f0f2f5;
      color: #1a1a1a;
      border-radius: 4px 14px 14px 14px;
    }

    .message.user .bubble {
      background: #1a56a0;
      color: #fff;
      border-radius: 14px 4px 14px 14px;
    }

    .message .icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.ai .icon { background: #e6f1fb; }
    .message.user .icon { background: #1a56a0; color: #fff; font-size: 11px; font-weight: 600; }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      background: #f0f2f5;
      border-radius: 4px 14px 14px 14px;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .chat-input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .api-key-area {
      padding: 0.75rem 1.5rem;
      background: #fffbea;
      border-top: 1px solid #f0e0a0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .api-key-area input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      outline: none;
    }

    .api-key-area input:focus { border-color: #1a56a0; }
    .api-key-area label { font-size: 12px; color: #888; white-space: nowrap; }

    textarea {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #1a56a0; }

    button#sendBtn {
      background: #1a56a0;
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    button#sendBtn:hover { background: #154a8a; }
    button#sendBtn:disabled { background: #ccc; cursor: not-allowed; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
      gap: 10px;
      font-size: 14px;
      text-align: center;
    }

    .empty-state .big-icon { font-size: 40px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      background: #f0f2f5;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: #444;
      cursor: pointer;
      transition: background 0.15s;
    }

    .suggestion-chip:hover { background: #e6f1fb; border-color: #1a56a0; color: #1a56a0; }
  </style>
</head>
<body>
<div class="chat-container">

  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div>
      <h1>AI Assistant</h1>
      <p>Powered by Groq + LLaMA 3</p>
    </div>
  </div>

  <div class="api-key-area">
    <label>API Key:</label>
    <input type="password" id="apiKey" placeholder="Paste your Groq API key here (gsk_...)"/>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">💬</div>
      <div>Ask me anything!</div>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="sendSuggestion('What is machine learning?')">What is machine learning?</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Write a short poem about coding')">Write a poem about coding</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Explain REST APIs simply')">Explain REST APIs</div>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="userInput" placeholder="Type your message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
  const conversationHistory = [];

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  function addMessage(role, text) {
    const emptyState = document.getElementById('emptyState');
    if (emptyState) emptyState.remove();

    const container = document.getElementById('chatMessages');
    const isUser = role === 'user';

    const div = document.createElement('div');
    div.className = `message ${isUser ? 'user' : 'ai'}`;

    div.innerHTML = `
      <div class="icon">${isUser ? 'KA' : '🤖'}</div>
      <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
    `;

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function showTyping() {
    const emptyState = document.getElementById('emptyState');
    if (emptyState) emptyState.remove();

    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="icon">🤖</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const apiKey = document.getElementById('apiKey').value.trim();
    const text = input.value.trim();

    if (!text) return;

    if (!apiKey) {
      alert('Please enter your OpenAI API key above.');
      return;
    }

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'llama-3.1-8b-instant',
          messages: [
            { role: 'system', content: 'You are a helpful, friendly AI assistant. Keep responses clear and concise.' },
            ...conversationHistory
          ],
          max_tokens: 800,
          temperature: 0.7
        })
      });

      const data = await response.json();

      if (data.error) {
        throw new Error(data.error.message);
      }

      const reply = data.choices[0].message.content;
      conversationHistory.push({ role: 'assistant', content: reply });

      removeTyping();
      addMessage('ai', reply);

    } catch (err) {
      removeTyping();
      addMessage('ai', `Error: ${err.message}. Please check your API key and try again.`);
    }

    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
